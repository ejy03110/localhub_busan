<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시글 상세 | LocalHub</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<a class="skip-link" href="#main">본문 바로가기</a>
<header class="app-header">
  <div class="header-inner">
    <a class="logo" href="index.html"><span class="logo-mark">L</span><span>LocalHub</span></a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-link" href="index.html">홈</a>
      <a class="nav-link" href="explore.html">지역 탐색</a>
      <a class="nav-link" href="festival.html">축제 캘린더</a>
      <a class="nav-link" href="board.html">커뮤니티</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" type="button" data-chat-toggle aria-label="챗봇 열기">💬</button>
      <button class="icon-btn mobile-nav-button" type="button" aria-label="메뉴">☰</button>
    </div>
  </div>
</header>


<main class="page" id="main">
  <div class="breadcrumb">홈 &gt; 부산 커뮤니티 &gt; 게시글 상세</div>
  <article class="detail-card">
    <header class="detail-head">
      <h1 data-detail-title></h1>
      <div class="post-meta" data-detail-meta></div>
    </header>
    <div class="detail-body" data-detail-content></div>
    <div class="detail-actions">
      <a class="btn btn-ghost" href="board.html">목록으로</a>
      <div class="action-group">
        <button class="btn btn-soft" type="button" data-edit>수정</button>
        <button class="btn btn-danger" type="button" data-delete>삭제</button>
      </div>
    </div>
  </article>
</main>

<div class="modal-backdrop" data-password-modal>
  <div class="modal">
    <h3 data-password-modal-title>비밀번호 확인</h3>
    <p class="post-meta">게시글 작성 시 입력한 비밀번호를 입력하세요.</p>
    <input class="input" type="password" data-password-input placeholder="비밀번호">
    <div class="modal-actions">
      <button class="btn btn-ghost" type="button" data-password-cancel>취소</button>
      <button class="btn btn-primary" type="button" data-password-confirm>확인</button>
    </div>
  </div>
</div>


<button class="chat-fab" type="button" data-chat-toggle aria-label="LocalHub 챗봇 열기">💬</button>
<section class="chat-panel" data-chat-panel aria-label="LocalHub 챗봇">
  <header class="chat-head">
    <div><h3>LocalHub 챗</h3><small>부산 지역 정보 도우미</small></div>
    <button class="chat-close" type="button" data-chat-close aria-label="닫기">×</button>
  </header>
  <div class="chat-body" data-chat-body>
    <div class="message bot">안녕하세요. 관광지, 축제, 맛집, 여행 코스 또는 커뮤니티 게시글을 질문해 주세요.</div>
  </div>
  <form class="chat-input" data-chat-form>
    <input class="input" data-chat-input placeholder="예: 이번 주말 부산 축제 알려줘" />
    <button class="btn btn-primary" type="submit">전송</button>
  </form>
</section>


<footer class="app-footer">
  <div class="footer-inner">
    <span>© 2026 LocalHub · 부산 지역 정보 공유 커뮤니티</span>
    <span>공공데이터 기반 교육용 SPA 프로토타입</span>
  </div>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
