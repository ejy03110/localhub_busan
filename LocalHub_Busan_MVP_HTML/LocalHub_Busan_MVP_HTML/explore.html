<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>부산 지역 탐색 | LocalHub</title>
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<a class="skip-link" href="#main">본문 바로가기</a>
<header class="app-header">
  <div class="header-inner">
    <a class="logo" href="index.html"><span class="logo-mark">L</span><span>LocalHub</span></a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-link" href="index.html">홈</a>
      <a class="nav-link" href="explore.html">지역 탐색</a>
      <a class="nav-link" href="board.html">커뮤니티</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" type="button" data-chat-toggle aria-label="챗봇 열기">💬</button>
      <button class="icon-btn mobile-nav-button" type="button" aria-label="메뉴">☰</button>
    </div>
  </div>
</header>

<main class="page" id="main">
  <div class="breadcrumb">홈 &gt; 부산 &gt; 지역 탐색</div>
  <div class="page-heading">
    <div>
      <h1>부산 지역 탐색</h1>
      <p>관광지, 문화시설, 축제·행사, 레포츠, 쇼핑, 숙박을 지도에서 확인하세요.</p>
    </div>
  </div>

  <div class="explore-layout">
    <!-- 필터 패널 -->
    <aside class="panel filter-panel">
      <!-- 카테고리 필터 -->
      <div class="filter-group">
        <h3>카테고리</h3>
        <div class="checkbox-list">
          <label><input type="checkbox" value="관광지" data-map-filter checked> 관광지</label>
          <label><input type="checkbox" value="문화시설" data-map-filter checked> 문화시설</label>
          <label><input type="checkbox" value="축제" data-map-filter checked> 축제·행사</label>
          <label><input type="checkbox" value="레포츠" data-map-filter checked> 레포츠</label>
          <label><input type="checkbox" value="쇼핑" data-map-filter checked> 쇼핑</label>
          <label><input type="checkbox" value="숙박" data-map-filter checked> 숙박</label>
        </div>
      </div>

      <!-- 지역 필터 -->
      <div class="filter-group">
        <label for="region-select">지역</label>
        <select id="region-select">
          <option value="부산 전체">부산 전체</option>
          <option value="서면구">서면구</option>
          <option value="수영구">수영구</option>
          <option value="해운대구">해운대구</option>
          <option value="영도구">영도구</option>
        </select>
      </div>

      <!-- 검색 필터 -->
      <div class="filter-group">
        <label for="search-input">검색</label>
        <input id="search-input" class="input" type="text" placeholder="장소명을 입력하세요">
      </div>

      <!-- 필터 버튼 -->
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-primary" id="apply-filter" type="button" style="flex: 1;">필터 적용</button>
        <button class="btn" id="reset-filter" type="button" style="flex: 1; background: #f0f0f0; color: #333;">초기화</button>
      </div>
    </aside>

    <!-- 지도 패널 -->
    <section class="panel map-panel">
      <div id="explore-map" style="width: 100%; height: 600px; border-radius: 16px; overflow: hidden;"></div>
      <div style="padding:14px 20px;color:var(--muted);font-size:14px" data-map-info>관광지, 문화시설, 축제·행사, 레포츠, 쇼핑, 숙박을 지도에 표시 중입니다.</div>
    </section>
  </div>
</main>

<!-- 챗봇 -->
<button class="chat-fab" type="button" data-chat-toggle aria-label="LocalHub 챗봇 열기">💬</button>
<section class="chat-panel" data-chat-panel aria-label="LocalHub 챗봇">
  <header class="chat-head">
    <div><h3>LocalHub 챗</h3><small>부산 지역 정보 도우미</small></div>
    <button class="chat-close" type="button" data-chat-close aria-label="닫기">×</button>
  </header>
  <div class="chat-body" data-chat-body>
    <div class="message bot">안녕하세요. 관광지, 축제, 맛집, 여행 코스 또는 커뮤니티 게시글을 질문해 주세요.</div>
  </div>
  <form class="chat-input" data-chat-form>
    <input class="input" data-chat-input placeholder="예: 이번 주말 부산 축제 알려줘" />
    <button class="btn btn-primary" type="submit">전송</button>
  </form>
</section>

<footer class="app-footer">
  <div class="footer-inner">
    <span>© 2026 LocalHub · 부산 지역 정보 공유 커뮤니티</span>
    <span>공공데이터 기반 교육용 SPA 프로토타입</span>
  </div>
</footer>

<script src="assets/app.js"></script>
<script>
  // initExplore가 완료된 후 필터 자동 적용
  document.addEventListener('DOMContentLoaded', () => {
    // initExplore 실행 후 약간의 시간 대기
    setTimeout(() => {
      const filterBtn = document.getElementById('apply-filter');
      if (filterBtn) {
        filterBtn.click();
      }
    }, 100);
  });
</script>
</body>
</html>
