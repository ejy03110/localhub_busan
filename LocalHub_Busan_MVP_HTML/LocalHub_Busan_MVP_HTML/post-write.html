<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시글 작성 | LocalHub</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<a class="skip-link" href="#main">본문 바로가기</a>
<header class="app-header">
  <div class="header-inner">
    <a class="logo" href="index.html"><span class="logo-mark">L</span><span>LocalHub</span></a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a class="nav-link" href="index.html">홈</a>
      <a class="nav-link" href="explore.html">지역 탐색</a>
      <a class="nav-link" href="festival.html">축제 캘린더</a>
      <a class="nav-link" href="board.html">커뮤니티</a>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" type="button" data-chat-toggle aria-label="챗봇 열기">💬</button>
      <button class="icon-btn mobile-nav-button" type="button" aria-label="메뉴">☰</button>
    </div>
  </div>
</header>


<main class="page" id="main">
  <div class="breadcrumb">홈 &gt; 부산 커뮤니티 &gt; 글쓰기</div>
  <div class="page-heading"><div><h1 data-form-title>게시글 작성</h1><p>지역 주민과 관광객에게 도움이 되는 정보를 공유해 주세요.</p></div></div>
  <form class="form-card" data-post-form>
    <div class="field">
      <label for="category">카테고리</label>
      <select id="category" data-post-category>
        <option>관광지</option><option>문화시설</option><option>축제</option><option>맛집</option><option>여행코스</option>
      </select>
    </div>
    <div class="field">
      <label for="title">제목</label>
      <input id="title" class="input" data-post-title placeholder="제목을 입력하세요">
    </div>
    <div class="field">
      <label for="content">내용</label>
      <textarea id="content" data-post-content placeholder="지역 정보나 방문 경험을 입력하세요"></textarea>
    </div>
    <div class="field">
      <label for="password">수정용 비밀번호</label>
      <input id="password" class="input" type="password" data-post-password placeholder="4자리 이상 입력">
      <div class="help">수정·삭제 시 동일한 비밀번호가 필요합니다. 교육용 설계에 따라 브라우저에 저장됩니다.</div>
    </div>
    <div class="form-actions">
      <a class="btn btn-ghost" href="board.html">취소</a>
      <button class="btn btn-primary" type="submit">저장</button>
    </div>
  </form>
</main>


<button class="chat-fab" type="button" data-chat-toggle aria-label="LocalHub 챗봇 열기">💬</button>
<section class="chat-panel" data-chat-panel aria-label="LocalHub 챗봇">
  <header class="chat-head">
    <div><h3>LocalHub 챗</h3><small>부산 지역 정보 도우미</small></div>
    <button class="chat-close" type="button" data-chat-close aria-label="닫기">×</button>
  </header>
  <div class="chat-body" data-chat-body>
    <div class="message bot">안녕하세요. 관광지, 축제, 맛집, 여행 코스 또는 커뮤니티 게시글을 질문해 주세요.</div>
  </div>
  <form class="chat-input" data-chat-form>
    <input class="input" data-chat-input placeholder="예: 이번 주말 부산 축제 알려줘" />
    <button class="btn btn-primary" type="submit">전송</button>
  </form>
</section>


<footer class="app-footer">
  <div class="footer-inner">
    <span>© 2026 LocalHub · 부산 지역 정보 공유 커뮤니티</span>
    <span>공공데이터 기반 교육용 SPA 프로토타입</span>
  </div>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
